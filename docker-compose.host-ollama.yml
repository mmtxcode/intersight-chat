# Override that runs ONLY the app container and points it at an Ollama
# instance already running on the Docker host.
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.host-ollama.yml up -d --build app
# (note the trailing `app` — that scopes `up` to the app service only)

services:
  app:
    # Skip waiting for the bundled ollama service.
    depends_on: !reset []
    environment:
      OLLAMA_BASE_URL: http://host.docker.internal:11434/v1
      OLLAMA_TAGS_URL: http://host.docker.internal:11434/api/tags
      OLLAMA_API_KEY: ollama
      INTERSIGHT_BASE_URL: ${INTERSIGHT_BASE_URL:-https://intersight.com}
    extra_hosts:
      # Linux hosts don't auto-resolve host.docker.internal; this maps it to
      # the docker bridge gateway. macOS / Windows already resolve it natively.
      - "host.docker.internal:host-gateway"
